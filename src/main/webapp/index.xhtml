<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      lang="fr"
>
<h:head>
    <title>Etudiants</title>
</h:head>
<h:body>
    <h:form>
        <div>
            <h:dataTable value="#{etudiantBean.etudiants}" var="etudiant" border="1">
                <h:column>
                    <f:facet name="header">Nom</f:facet>
                    <h:outputText value="#{etudiant.nom}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">Prénom</f:facet>
                    <h:outputText value="#{etudiant.prenom}"/>
                </h:column>
                <h:column>
                    <f:facet name="header">Age</f:facet>
                    <h:outputText value="#{etudiant.age}"/>
                </h:column>
                <h:column>
                    <h:commandButton value="Select" action="#{etudiantBean.select(etudiant)}"/>
                </h:column>
            </h:dataTable>
        </div>
        <br/>
        <hr/>
        <br/>
        <h:outputLabel>Nom : <h:inputText value="#{etudiantBean.nouvelEtudiant.nom}"/></h:outputLabel> <br/><br/>
        <h:outputLabel>Prénom : <h:inputText value="#{etudiantBean.nouvelEtudiant.prenom}"/></h:outputLabel> <br/><br/>
        <h:outputLabel>Âge : <h:inputText value="#{etudiantBean.nouvelEtudiant.age}"/></h:outputLabel> <br/><br/>
        <h:commandButton value="Submit" action="#{etudiantBean.ajouter()}" binding="#{etudiantBean.htmlCommandSubmit}"/>
        <h:commandButton value="Modifier" action="#{etudiantBean.modifier()}" binding="#{etudiantBean.htmlCommandEdit}"/>
        <h:commandButton value="Delete" action="#{etudiantBean.delete()}" binding="#{etudiantBean.htmlCommandDelete}"/>
    </h:form>
</h:body>
</html>
